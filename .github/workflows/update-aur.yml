name: Update AUR Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Initialise pacman and update system
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Su --noconfirm
          pacman -S --noconfirm git openssh base-devel curl ca-certificates pacman-contrib

      - name: Clone AUR package
        run: git clone https://aur.archlinux.org/clipse.git

      - name: Get latest upstream version
        id: version
        run: |
          LATEST=$(curl -s https://api.github.com/repos/savedra1/clipse/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | sed 's/^v//')
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        working-directory: clipse
        run: |
          NEW_VER="${{ steps.version.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          useradd -m builder
          chown -R builder:builder .
          su builder -c "updpkgsums"

      - name: Regenerate .SRCINFO
        working-directory: clipse
        run: |
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Commit and push to AUR
        working-directory: clipse
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          git config --global --add safe.directory /__w/clipse/clipse/clipse
          git remote set-url origin ssh://aur@aur.archlinux.org:22/clipse.git
          git config user.name "GitHub Actions"
          git config user.email "${{ secrets.AUR_EMAIL }}"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ steps.version.outputs.version }}"
          git push